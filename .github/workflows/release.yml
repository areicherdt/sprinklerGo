name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/sprinklergo:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/sprinklergo:latest

  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Build binaries
        run: |
          mkdir -p dist
          LDFLAGS="-X main.version=${GITHUB_REF_NAME}"
          GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/sprinklerd-linux-arm64 ./cmd/sprinklerd
          # 32-bit Raspberry Pi OS (armv6 läuft auf Pi 1/Zero bis Pi 4)
          GOOS=linux GOARCH=arm GOARM=6 go build -ldflags "$LDFLAGS" -o dist/sprinklerd-linux-armv6 ./cmd/sprinklerd
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/sprinklerd-linux-amd64 ./cmd/sprinklerd

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/sprinklerd-linux-arm64
            dist/sprinklerd-linux-armv6
            dist/sprinklerd-linux-amd64
            deploy/sprinklerd.service
          generate_release_notes: true
