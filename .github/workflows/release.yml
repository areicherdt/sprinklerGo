name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Build binaries
        run: |
          mkdir -p dist
          LDFLAGS="-X main.version=${GITHUB_REF_NAME}"
          GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/sprinklerd-linux-arm64 ./cmd/sprinklerd
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/sprinklerd-linux-amd64 ./cmd/sprinklerd

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/sprinklerd-linux-arm64
            dist/sprinklerd-linux-amd64
            deploy/sprinklerd.service
          generate_release_notes: true
