name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Frontend check & build
        working-directory: web
        run: |
          npm ci
          npm run check
          npm run build

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Go vet
        run: go vet ./...

      - uses: golangci/golangci-lint-action@v8

      - name: Go tests
        run: go test ./...

      - name: Cross-compile for Raspberry Pi (arm64)
        run: GOOS=linux GOARCH=arm64 go build -o /dev/null ./cmd/sprinklerd
